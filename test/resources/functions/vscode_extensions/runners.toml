[common]
setup-tag = "setup"

[case.default]
os = "ubuntu-24.04"

[case.default.test]
assert-install-names = ["run_command", "vscode_extensions"]

[[case.default.test.commands]]
command = "bash"
arguments = ["-ceu", "cat /tmp/code_calls.log"]
assert-stdout-contains = "--install-extension EditorConfig.EditorConfig"

[[case.default.test.commands]]
command = "bash"
arguments = ["-ceu", "cat /tmp/code_calls.log"]
assert-stdout-contains = "--install-extension dbaeumer.vscode-eslint"
