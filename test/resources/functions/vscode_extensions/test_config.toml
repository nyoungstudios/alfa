[ run_command ]
tags = ["setup"]
options = [
  "bash",
  "-ceu",
  "mkdir -p /tmp/mockbin && printf '#!/bin/bash\necho "$@" >> /tmp/code_calls.log\n' > /tmp/mockbin/code && chmod +x /tmp/mockbin/code && : > /tmp/code_calls.log"
]

[ vscode_extensions ]
options = [
  "EditorConfig.EditorConfig",
  "dbaeumer.vscode-eslint"
]

[ vscode_extensions.env ]
PATH = "/tmp/mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
