[ run_command ]
tags = ["setup"]
options = [
  "bash",
  "-ceu",
  '''
mkdir -p /tmp/mockbin
: > /tmp/docker_calls.log

cat > /tmp/mockbin/apt-get <<"MOCK"
#!/bin/bash
echo apt-get "$@" >> /tmp/docker_calls.log
MOCK

cat > /tmp/mockbin/curl <<"MOCK"
#!/bin/bash
echo curl "$@" >> /tmp/docker_calls.log
echo dummy
MOCK

cat > /tmp/mockbin/gpg <<"MOCK"
#!/bin/bash
echo gpg "$@" >> /tmp/docker_calls.log
out=""
while [ $# -gt 0 ]; do
  if [ "$1" = "-o" ]; then
    out="$2"
    break
  fi
  shift
done
if [ -n "$out" ]; then
  cat > "$out"
else
  cat > /dev/null
fi
MOCK

cat > /tmp/mockbin/dpkg <<"MOCK"
#!/bin/bash
echo dpkg "$@" >> /tmp/docker_calls.log
echo amd64
MOCK

cat > /tmp/mockbin/lsb_release <<"MOCK"
#!/bin/bash
echo lsb_release "$@" >> /tmp/docker_calls.log
echo noble
MOCK

cat > /tmp/mockbin/groupadd <<"MOCK"
#!/bin/bash
echo groupadd "$@" >> /tmp/docker_calls.log
MOCK

cat > /tmp/mockbin/gpasswd <<"MOCK"
#!/bin/bash
echo gpasswd "$@" >> /tmp/docker_calls.log
MOCK

chmod +x /tmp/mockbin/*
'''
]

[ docker ]
options = []

[ docker.env ]
PATH = "/tmp/mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
