[ run_command ]
tags = ["setup"]
options = [
  "bash",
  "-ceu",
  'mkdir -p /tmp/mockbin && : > /tmp/docker_calls.log && printf "#!/bin/bash\necho apt-get \"$@\" >> /tmp/docker_calls.log\n" > /tmp/mockbin/apt-get && printf "#!/bin/bash\necho curl \"$@\" >> /tmp/docker_calls.log\necho dummy\n" > /tmp/mockbin/curl && printf "#!/bin/bash\necho gpg \"$@\" >> /tmp/docker_calls.log\nout=\"\"; while [ $# -gt 0 ]; do if [ \"$1\" = \"-o\" ]; then out=\"$2\"; break; fi; shift; done; [ -n \"$out\" ] && cat > \"$out\" || cat > /dev/null\n" > /tmp/mockbin/gpg && printf "#!/bin/bash\necho dpkg \"$@\" >> /tmp/docker_calls.log\necho amd64\n" > /tmp/mockbin/dpkg && printf "#!/bin/bash\necho lsb_release \"$@\" >> /tmp/docker_calls.log\necho noble\n" > /tmp/mockbin/lsb_release && printf "#!/bin/bash\necho groupadd \"$@\" >> /tmp/docker_calls.log\n" > /tmp/mockbin/groupadd && printf "#!/bin/bash\necho gpasswd \"$@\" >> /tmp/docker_calls.log\n" > /tmp/mockbin/gpasswd && chmod +x /tmp/mockbin/*'
]

[ docker ]
options = []

[ docker.env ]
PATH = "/tmp/mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
