[ run_command ]
tags = ["setup"]
options = [
  "bash",
  "-ceu",
  'mkdir -p /tmp/mockbin ~/.oh-my-zsh/custom/themes && printf "#!/bin/bash\nif [ \"$1\" = \"clone\" ]; then dst=\"${@: -1}\"; mkdir -p \"$dst\"; fi\necho \"$@\" >> /tmp/p10k_git_calls.log\n" > /tmp/mockbin/git && chmod +x /tmp/mockbin/git && : > /tmp/p10k_git_calls.log && printf "ZSH_THEME=\"robbyrussell\"\n" > ~/.zshrc'
]

[ p10k ]
options = []

[ p10k.env ]
PATH = "/tmp/mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
