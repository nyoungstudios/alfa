[ run_command ]
tags = ["setup"]
options = [
  "bash",
  "-ceu",
  '''
mkdir -p /tmp/mockbin
cat > /tmp/mockbin/curl <<"MOCK"
#!/bin/bash
echo curl "$@" >> /tmp/jetbrains_calls.log
out="${@: -1}"
echo archive > "$out"
MOCK
cat > /tmp/mockbin/tar <<"MOCK"
#!/bin/bash
echo tar "$@" >> /tmp/jetbrains_calls.log
mkdir -p /tmp/jetbrains-toolbox-tmp/jetbrains-toolbox-1.25.12627
cat > /tmp/jetbrains-toolbox-tmp/jetbrains-toolbox-1.25.12627/jetbrains-toolbox <<"TOOLBOX"
#!/bin/bash
echo ran > /tmp/jetbrains_toolbox_ran
TOOLBOX
chmod +x /tmp/jetbrains-toolbox-tmp/jetbrains-toolbox-1.25.12627/jetbrains-toolbox
MOCK
chmod +x /tmp/mockbin/curl /tmp/mockbin/tar
: > /tmp/jetbrains_calls.log
rm -f /tmp/jetbrains_toolbox_ran
'''
]

[ jetbrains_toolbox ]
options = []

[ jetbrains_toolbox.env ]
PATH = "/tmp/mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
