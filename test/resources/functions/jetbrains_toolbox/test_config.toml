[ run_command ]
tags = ["setup"]
options = [
  "bash",
  "-ceu",
  'mkdir -p /tmp/mockbin && printf "#!/bin/bash\necho curl \"$@\" >> /tmp/jetbrains_calls.log\nout=\"${@: -1}\"\necho archive > \"$out\"\n" > /tmp/mockbin/curl && printf "#!/bin/bash\necho tar \"$@\" >> /tmp/jetbrains_calls.log\nmkdir -p /tmp/jetbrains-toolbox-tmp/jetbrains-toolbox-1.25.12627\nprintf \"#!/bin/bash\\\\necho ran > /tmp/jetbrains_toolbox_ran\\\\n\" > /tmp/jetbrains-toolbox-tmp/jetbrains-toolbox-1.25.12627/jetbrains-toolbox\nchmod +x /tmp/jetbrains-toolbox-tmp/jetbrains-toolbox-1.25.12627/jetbrains-toolbox\n" > /tmp/mockbin/tar && chmod +x /tmp/mockbin/curl /tmp/mockbin/tar && : > /tmp/jetbrains_calls.log && rm -f /tmp/jetbrains_toolbox_ran'
]

[ jetbrains_toolbox ]
options = []

[ jetbrains_toolbox.env ]
PATH = "/tmp/mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
