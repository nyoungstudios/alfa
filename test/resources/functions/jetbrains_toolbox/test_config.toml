[ run_command ]
tags = ["setup"]
options = [
  "bash",
  "-ceu",
  "Xvfb :99 -screen 0 1024x768x24 >/tmp/xvfb.log 2>&1 & echo $! > /tmp/xvfb.pid"
]

[ jetbrains_toolbox ]
options = []

[ jetbrains_toolbox.env ]
DISPLAY = ":99"

[ "run_command+teardown" ]
tags = ["teardown"]
options = [
  "bash",
  "-ceu",
  '''
python - <<'INNER'
from pathlib import Path
import os, signal
import sys
pid = Path('/tmp/xvfb.pid')
if pid.exists():
    try:
        os.kill(int(pid.read_text().strip()), signal.SIGTERM)
    except (ProcessLookupError, ValueError):
        pass
    except Exception as exc:
        print(f'warning: failed to stop Xvfb: {exc}', file=sys.stderr)
INNER
'''
]
