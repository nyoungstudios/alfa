[common]
[common.test]
assert-install-names = ["jetbrains_toolbox"]

[[common.test.commands]]
command = "bash"
arguments = [
  "-ceu",
  "[[ -x ~/.local/bin/jetbrains-toolbox ]] && echo exists || echo missing",
]
assert-stdout-equals = "exists"

[[common.test.commands]]
command = "bash"
arguments = [
  "-ceu",
  'target="$(readlink -f ~/.local/bin/jetbrains-toolbox)"; [[ "$target" == "$HOME/.local/share/JetBrains/Toolbox/bin/jetbrains-toolbox" ]] && echo matched || echo unmatched',
]
assert-stdout-equals = "matched"

[case.linux-x86]
os = "ubuntu-24.04"

[case.linux-arm]
os = "ubuntu-24.04"
image = "ubuntu:24.04"
platform = "linux/arm64"
