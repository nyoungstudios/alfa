[ run_command ]
tags = ["setup"]
options = [
  "bash",
  "-ceu",
  "mkdir -p /tmp/mockbin && printf '#!/bin/bash\necho "$@" >> /tmp/apk_calls.log\n' > /tmp/mockbin/apk && chmod +x /tmp/mockbin/apk && : > /tmp/apk_calls.log"
]

[ apk_packages ]
options = [
  "jq",
  "vim"
]

[ apk_packages.env ]
PATH = "/tmp/mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
