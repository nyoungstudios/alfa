[common]
setup-tag = "setup"

[case.default]
os = "ubuntu-24.04"

[case.default.test]
assert-install-names = ["run_command", "apk_packages"]

[[case.default.test.commands]]
command = "bash"
arguments = ["-ceu", "cat /tmp/apk_calls.log"]
assert-stdout-contains = "update"

[[case.default.test.commands]]
command = "bash"
arguments = ["-ceu", "cat /tmp/apk_calls.log"]
assert-stdout-contains = "add --no-interactive jq vim"
