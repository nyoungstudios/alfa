[ run_command ]
tags = ["setup"]
options = [
  "bash",
  "-ceu",
  "mkdir -p ~/.oh-my-zsh/custom/plugins /tmp/omz-plugin && git -C /tmp/omz-plugin init && printf '# plugin\n' > /tmp/omz-plugin/README.md && git -C /tmp/omz-plugin add README.md && git -C /tmp/omz-plugin -c user.name='a' -c user.email='a@b.c' commit -m init"
]

[ install_ohmyzsh_plugins ]
options = [
  "/tmp/omz-plugin"
]
