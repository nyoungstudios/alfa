[ run_command ]
tags = ["setup"]
options = [
  "bash",
  "-ceu",
  "mkdir -p /tmp/mockbin && printf '#!/bin/bash\necho "$@" >> /tmp/brew_pkg_calls.log\n' > /tmp/mockbin/brew && chmod +x /tmp/mockbin/brew && : > /tmp/brew_pkg_calls.log"
]

[ brew_packages ]
options = [
  "jq",
  "neofetch"
]

[ brew_packages.env ]
PATH = "/tmp/mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
