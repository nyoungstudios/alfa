[ run_command ]
tags = ["setup"]
options = [
  "bash",
  "-ceu",
  'mkdir -p /tmp/mockbin && printf "#!/bin/bash\necho "$@" >> /tmp/apm_calls.log\n" > /tmp/mockbin/apm && chmod +x /tmp/mockbin/apm && : > /tmp/apm_calls.log'
]

[ atom_packages ]
options = [
  "pretty-json",
  "vim-mode-plus"
]

[ atom_packages.env ]
PATH = "/tmp/mockbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
