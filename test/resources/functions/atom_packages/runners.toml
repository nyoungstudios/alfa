[common]
setup-tag = "setup"

[case.default]
os = "ubuntu-24.04"

[case.default.test]
assert-install-names = ["apt_get_packages", "deb_package", "atom_packages"]

[[case.default.test.commands]]
command = "apm"
arguments = ["list", "--installed", "--bare"]
assert-stdout-contains = "language-docker@"
