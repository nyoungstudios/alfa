[common]
setup-tag = "setup"

[case.default]
os = "ubuntu-24.04"
image = "phusion/baseimage:jammy-1.0.4"

[case.default.test]
assert-install-names = ["apt_get_packages", "sdkman", "sdk_candidate"]

[[case.default.test.commands]]
command = "bash"
arguments = ["-ceu", 'source "$HOME/.sdkman/bin/sdkman-init.sh"; sdk current maven']
assert-stdout-contains = "3.9.11"
